<!-- Full Page Loader -->
<div *ngIf="isLoading" class="fixed inset-0 bg-white bg-opacity-90 z-50 flex items-center justify-center">
    <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-16 w-16 border-4 border-orange-600 border-t-transparent mb-4"></div>
        <p class="text-gray-600 font-inter text-lg">Loading your dashboard...</p>
        <p class="text-sm text-gray-500 mt-2">Please wait while we fetch your data</p>
    </div>
</div>

<!-- Main Dashboard Content -->
<div class="flex flex-col lg:flex-row min-h-screen bg-gray-50" [class.opacity-50]="isLoading" [class.pointer-events-none]="isLoading">
    <!-- Left Section - Quotes Component (50% width) -->
    <div class="w-full lg:w-1/2">
        <app-customer-quotes 
            (dataLoaded)="onChildDataLoaded('quotes')">
        </app-customer-quotes>
    </div>
    
    <!-- Right Section - Empty/Dashboard Content (50% width) -->
    <div class="w-full lg:w-1/2 p-8 bg-gradient-to-br from-orange-50 to-white">
        <div class="sticky top-8">
            <!-- Dashboard Content -->
            <div class="text-center max-w-md mx-auto mt-20">
                <div class="w-32 h-32 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="ri-dashboard-line text-5xl text-orange-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-3 font-poppins">Dashboard</h2>
                <p class="text-gray-600 mb-6">
                    Welcome to your dashboard. More features coming soon!
                </p>
                
                <!-- Quick Stats or Summary Cards -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-orange-100">
                        <p class="text-sm text-gray-600">Active Leads</p>
                        <p class="text-2xl font-bold text-orange-600">0</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-orange-100">
                        <p class="text-sm text-gray-600">Pending Quotes</p>
                        <p class="text-2xl font-bold text-orange-600">{{ pendingQuotesCount }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
