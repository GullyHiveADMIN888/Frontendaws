<!-- CUSTOMER NAVBAR -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">

    <!-- Logo -->
    <a routerLink="/buyer" class="flex items-center">
      <img src="assets/gali_logo.png" alt="GullyHive Logo" class="h-10 w-auto mr-2">
    </a>

    <!-- Navigation Links - Using /buyer paths -->
    <div class="hidden md:flex gap-8">
      <a routerLink="/buyer/dashboard" routerLinkActive="text-orange-600 border-b-2 border-orange-600"
        [routerLinkActiveOptions]="{ exact: true }" class="text-gray-600 font-medium pb-1">
        Dashboard
      </a>

      <a routerLink="/buyer/leads" routerLinkActive="text-orange-600 border-b-2 border-orange-600"
        class="text-gray-600 font-medium pb-1">My Leads</a>

      <a routerLink="/buyer/settings" routerLinkActive="text-orange-600 border-b-2 border-orange-600"
        class="text-gray-600 font-medium pb-1">Settings</a>

      <a routerLink="/buyer/help" routerLinkActive="text-orange-600 border-b-2 border-orange-600"
        class="text-gray-600 font-medium pb-1">Help</a>
    </div>

    <!-- User Menu -->
    <div class="relative">
      <!-- Loading State -->
      <div *ngIf="loading" class="flex items-center space-x-3">
        <div class="w-10 h-10 rounded-full bg-gray-200 animate-pulse"></div>
        <div class="w-4 h-4 bg-gray-200 animate-pulse rounded"></div>
      </div>

      <!-- User Menu Button -->
      <button *ngIf="!loading" (click)="toggleUserMenu()" class="flex items-center space-x-3 focus:outline-none group">
        <!-- Profile Picture -->
        <div class="flex-shrink-0">
          <img *ngIf="profilePicture; else dropdownInitials" [src]="profilePicture"
            class="w-12 h-12 rounded-full object-cover border-2 border-orange-200" (error)="onImageError()" />
          <ng-template #dropdownInitials>
            <div
              class="w-12 h-12 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold text-lg">
              {{ userInitials }}
            </div>
          </ng-template>
        </div>

        <i class="ri-arrow-down-s-line text-gray-600 group-hover:text-orange-600 transition-colors"></i>
      </button>

      <!-- Dropdown Menu -->
      <div *ngIf="showUserMenu && !loading">
        <div class="fixed inset-0 z-10" (click)="toggleUserMenu()"></div>
        <div class="absolute right-0 mt-2 w-72 bg-white rounded-lg shadow-xl border border-gray-200 py-2 z-20">

          <!-- User Info Header with Enhanced Details -->
          <div class="px-4 py-3 border-b border-gray-200">
            <div class="flex items-start space-x-3">
              <!-- Small Avatar in dropdown -->
              <div class="flex-shrink-0">
                <img *ngIf="profilePicture; else dropdownInitials" [src]="profilePicture"
                  class="w-12 h-12 rounded-full object-cover border-2 border-orange-200" (error)="onImageError()" />
                <ng-template #dropdownInitials>
                  <div
                    class="w-12 h-12 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold text-lg">
                    {{ userInitials }}
                  </div>
                </ng-template>
              </div>

              <!-- User Details -->
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate">{{ displayName }}</p>
                <p class="text-xs text-gray-500 truncate">{{ email }}</p>
                <p class="text-xs text-gray-500 mt-1 flex items-center">
                  <i class="ri-phone-line mr-1 text-gray-400"></i>{{ phone }}
                </p>

                <!-- Verification Badges -->
                <div class="flex items-center space-x-2 mt-2">
                  <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                    [class.bg-green-100]="isEmailVerified" [class.text-green-800]="isEmailVerified"
                    [class.bg-gray-100]="!isEmailVerified" [class.text-gray-600]="!isEmailVerified">
                    <i class="ri-mail-check-line mr-1" *ngIf="isEmailVerified"></i>
                    <i class="ri-mail-line mr-1" *ngIf="!isEmailVerified"></i>
                    Email {{ isEmailVerified ? 'Verified' : 'Unverified' }}
                  </span>

                  <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                    [class.bg-green-100]="isPhoneVerified" [class.text-green-800]="isPhoneVerified"
                    [class.bg-gray-100]="!isPhoneVerified" [class.text-gray-600]="!isPhoneVerified">
                    <i class="ri-phone-check-line mr-1" *ngIf="isPhoneVerified"></i>
                    <i class="ri-phone-line mr-1" *ngIf="!isPhoneVerified"></i>
                    Phone {{ isPhoneVerified ? 'Verified' : 'Unverified' }}
                  </span>
                </div>
              </div>
            </div>
          </div>

          <!-- Menu Items -->
          <!-- <a [routerLink]="['/buyer/profile', customerId]"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
            <i class="ri-user-line mr-3 text-gray-400 group-hover:text-orange-500"></i> My Profile
          </a> -->

          <a routerLink="/buyer/dashboard"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
            <i class="ri-dashboard-line mr-3 text-gray-400"></i> Dashboard
          </a>

          <a routerLink="/buyer/leads"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
            <i class="ri-file-list-line mr-3 text-gray-400"></i> My Leads
          </a>

          <!-- <a routerLink="/buyer/generate-leads"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
            <i class="ri-add-circle-line mr-3 text-gray-400"></i> Generate Leads
          </a> -->

          <!-- <a routerLink="/buyer/saved-sellers"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
            <i class="ri-bookmark-line mr-3 text-gray-400"></i> Saved Sellers
          </a>

          <a routerLink="/buyer/settings"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
            <i class="ri-settings-3-line mr-3 text-gray-400"></i> Settings
          </a>

          <a routerLink="/buyer/referrals"
            class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
            <i class="ri-gift-line mr-3 text-gray-400"></i> Refer & Earn
          </a> -->

          <!-- Account Status -->
          <div class="px-4 py-2 border-t border-gray-200 mt-2">
            <div class="flex items-center justify-between text-xs">
              <span class="text-gray-500">Account Status:</span>
              <span class="font-medium" [class.text-green-600]="accountStatus === 'active'"
                [class.text-yellow-600]="accountStatus !== 'active'">
                {{ accountStatus | titlecase }}
              </span>
            </div>
          </div>

          <div class="border-t border-gray-200 pt-2">
            <!-- <a routerLink="/seller/dashboard"
              class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors">
              <i class="ri-arrow-left-right-line mr-3 text-gray-400"></i> Switch to Seller
            </a> -->

            <button (click)="logout()"
              class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
              <i class="ri-logout-box-line mr-3"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</nav>

<!-- PAGE CONTENT LOADS HERE -->
<main class="bg-gray-50 min-h-screen">
  <router-outlet></router-outlet>
</main>
