<div class="mb-8">
  <h2 class="text-xl font-bold text-gray-900 mb-4">
    Quick Actions
  </h2>

  <div class="grid grid-cols-3 md:grid-cols-3 lg:grid-cols-6 gap-2">

    @for (action of actions; track action) {
      <button
        type="button"
        class="cursor-pointer bg-white rounded-md p-3 border hover:shadow-md text-left"
        (click)="onAction(action)"
      >

        <div
          [ngClass]="action.color"
          class="w-8 h-8 flex items-center justify-center rounded-md mb-2"
        >
          <i [class]="action.icon + ' text-base'"></i>
        </div>

        <h3 class="font-semibold text-xs leading-tight">
          {{ action.title }}
        </h3>

      </button>
    }

  </div>
</div>
