<!-- GLOBAL ALERT (TOP RIGHT) -->
<div *ngIf="alertMessage"
     class="fixed top-5 right-5 px-4 py-3 rounded text-white shadow-lg z-[9999]"
     [ngClass]="alertType === 'success' ? 'bg-green-500' : 'bg-red-500'">
  {{ alertMessage }}
</div>
<div class="p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Users</h2>

    <button
      (click)="openModal()"
      class="bg-orange-600 text-white px-4 py-2 rounded-lg hover:bg-orange-700 flex items-center"
    >
      <i class="ri-user-add-line mr-2"></i>
      Add Worker
    </button>
  </div>


<div class="bg-white rounded-lg shadow border overflow-hidden">

  <div class="overflow-x-auto">
    <table class="min-w-[700px] w-full text-left text-sm sm:text-base">

      <thead class="bg-gray-100 text-gray-700">
        <tr>
          <th class="p-3 sm:p-4">Name</th>
          <th class="p-3 sm:p-4">Email</th>
          <th class="p-3 sm:p-4 hidden sm:table-cell">Phone</th>
          <th class="p-3 sm:p-4">Role</th>
          <th class="p-3 sm:p-4 hidden md:table-cell">Status</th>
          <th class="p-3 sm:p-4 text-center">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let user of users"
            class="border-t hover:bg-gray-50">

          <td class="p-3 sm:p-4 font-medium">
            {{user.name}}
          </td>

          <td class="p-3 sm:p-4 text-gray-600">
            {{user.email}}
          </td>

          <!-- Hidden on small screens -->
          <td class="p-3 sm:p-4 text-gray-600 hidden sm:table-cell">
            {{user.phone}}
          </td>

          <td class="p-3 sm:p-4">
            <span class="bg-indigo-100 text-indigo-600 px-2 sm:px-3 py-1 rounded-full text-xs sm:text-sm">
              {{user.role}}
            </span>
          </td>

          <!-- Hidden on small screens -->
          <td class="p-3 sm:p-4 text-gray-600 hidden md:table-cell">
            {{user.status}}
          </td>

          <td class="p-3 sm:p-4 text-center">
            <button
              (click)="deleteUser(user.id)"
              class="text-red-500 hover:text-red-700"
            >
              <i class="ri-delete-bin-line text-lg"></i>
            </button>
          </td>

        </tr>
      </tbody>

    </table>
  </div>

</div>

</div>

<!-- Popup Modal -->
<div *ngIf="showModal"
     class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">

  <div class="bg-white rounded-xl w-full max-w-2xl 
              max-h-[90vh] overflow-y-auto 
              p-4 sm:p-6 shadow-xl">

    <h3 class="text-lg sm:text-xl font-bold mb-4">Fetch Provider</h3>

    <!-- SEARCH -->
    <div class="flex flex-col sm:flex-row gap-2 mb-4">
      <input
        type="email"
        [(ngModel)]="searchEmail"
        placeholder="Enter Provider Email"
        class="border p-2 rounded w-full"
      />

      <input
        type="text"
        [(ngModel)]="searchPhone"
        placeholder="Enter Phone Number"
        class="border p-2 rounded w-full"
      />

      <button
        (click)="fetchProvider()"
        class="bg-blue-600 text-white px-4 py-2 rounded w-full sm:w-auto">
        Fetch
      </button>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">

      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.displayName" readonly placeholder="Display Name"/>
      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.legalName" readonly placeholder="Legal Name"/>

      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.state" readonly placeholder="Base State"/>
      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.baseCity" readonly placeholder="Base City"/>

      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.addressLine1" readonly placeholder="Address Line 1"/>
      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.addressLine2" readonly placeholder="Address Line 2"/>

      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.landmark" readonly placeholder="Landmark"/>
      <input class="border p-2 bg-gray-100" [(ngModel)]="profile.pincode" readonly placeholder="Pincode"/>

      <input class="border p-2 bg-gray-100 col-span-1 sm:col-span-2"
             [(ngModel)]="profile.areaName" readonly placeholder="Area"/>
    </div>

    <!-- IMAGE -->
    <div class="mt-4 flex justify-center sm:justify-start">
      <img *ngIf="profile.profilePictureUrl"
           [src]="profile.profilePictureUrl"
           class="w-20 h-20 sm:w-24 sm:h-24 rounded-full object-cover"/>
    </div>

    <!-- ACTIONS -->
    <div class="flex flex-col sm:flex-row justify-end gap-3 mt-6">

      <button
        (click)="closeModal()"
        class="w-full sm:w-auto px-4 py-2 border rounded hover:bg-gray-100">
        Close
      </button>

      <button
        (click)="saveUser()"
        [disabled]="!isFetched"
        class="w-full sm:w-auto px-4 py-2 bg-orange-600 text-white rounded hover:bg-orange-700 disabled:bg-gray-400">
        Save
      </button>

    </div>

  </div>
</div>
