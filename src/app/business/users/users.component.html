<div class="p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Users</h2>

    <button
      (click)="openModal()"
      class="bg-orange-600 text-white px-4 py-2 rounded-lg hover:bg-orange-700 flex items-center"
    >
      <i class="ri-user-add-line mr-2"></i>
      Add User
    </button>
  </div>


  <!-- Users Table -->
  <div class="bg-white rounded-lg shadow border overflow-hidden">

    <table class="w-full text-left">

      <thead class="bg-gray-100 text-gray-700">
        <tr>
          <th class="p-4">Name</th>
          <th class="p-4">Email</th>
          <th class="p-4">Phone</th>
          <th class="p-4">Role</th>
          <th class="p-4 text-center">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let user of users" class="border-t hover:bg-gray-50">

          <td class="p-4 font-medium">{{user.name}}</td>

          <td class="p-4 text-gray-600">{{user.email}}</td>

          <td class="p-4 text-gray-600">{{user.phone}}</td>

          <td class="p-4">
            <span class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-sm">
              {{user.role}}
            </span>
          </td>

          <td class="p-4 text-center">

            <button
              (click)="deleteUser(user.id)"
              class="text-red-500 hover:text-red-700"
            >
              <i class="ri-delete-bin-line text-lg"></i>
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>

<div *ngIf="showModal"
class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

<div class="bg-white rounded-xl w-[700px] p-6 shadow-xl overflow-y-auto max-h-[90vh]">

<h3 class="text-xl font-bold mb-4">Fetch Provider</h3>

<!-- SEARCH ID -->
<div class="flex gap-2 mb-4">

<input
type="number"
[(ngModel)]="searchId"
placeholder="Enter Seller/User ID"
class="border p-2 rounded w-full"
/>

<button
(click)="fetchProvider()"
class="bg-blue-600 text-white px-4 py-2 rounded"
>
Fetch
</button>

</div>

<!-- TWO COLUMN GRID -->
<div class="grid grid-cols-2 gap-4">

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.providerId" readonly placeholder="Provider Id"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.sellerId" readonly placeholder="User Id"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.legalName" readonly placeholder="Legal Name"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.displayName" readonly placeholder="Display Name"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.email" readonly placeholder="Email"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.phone" readonly placeholder="Phone"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.providerType" readonly placeholder="Provider Type"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.status" readonly placeholder="Status"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.baseCity" readonly placeholder="Base City"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.state" readonly placeholder="Base State"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.addressLine1" readonly placeholder="Address Line 1"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.addressLine2" readonly placeholder="Address Line 2"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.locality" readonly placeholder="Locality"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.landmark" readonly placeholder="Landmark"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.addressCity" readonly placeholder="City"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.addressState" readonly placeholder="State"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.pincode" readonly placeholder="Pincode"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.areaName" readonly placeholder="Area"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.totalJobsCompleted" readonly placeholder="Jobs Completed"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.totalDisputes" readonly placeholder="Total Disputes"/>

<input class="border p-2 bg-gray-100"
[(ngModel)]="profile.disputeRate" readonly placeholder="Dispute Rate"/>

</div>

<!-- IMAGE -->
<div class="mt-4">
<img *ngIf="profile.profilePictureUrl"
[src]="profile.profilePictureUrl"
class="w-24 h-24 rounded-full"/>
</div>

<div class="flex justify-end gap-3 mt-6">

<button
(click)="closeModal()"
class="px-4 py-2 border rounded hover:bg-gray-100">
Close
</button>

<button
(click)="saveUser()"
class="px-4 py-2 bg-orange-600 text-white rounded hover:bg-orange-700">
Save
</button>

</div>

</div>
</div>
