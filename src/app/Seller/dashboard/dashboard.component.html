      <!-- Welcome back, {{ user?.name || 'Seller' }}! 👋 -->
      Welcome back, {{ user?.name || 'Seller' }}! 👋
    </h1>
    <p class="text-gray-600">Here's what's happening with your business today.</p>
  </div>

  <!-- Child Components -->
  <app-profile-completion [user]="user"></app-profile-completion>
  <!-- <app-stats-cards [user]="user"></app-stats-cards> -->

<!-- DashboardComponent template -->

<!-- Modal -->




<!-- Overlay -->
<div *ngIf="showServicesModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">

  <!-- Modal Card -->
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl mx-4 flex flex-col max-h-[90vh]">

    <!-- Header -->
    <div class="flex items-center px-8 py-6 border-b border-gray-200">
      <div class="w-12 h-12 bg-orange-600 rounded-full flex items-center justify-center mr-4">
        <i class="ri-settings-3-line text-2xl text-white"></i>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-gray-900 font-poppins">
          Edit Services & Coverage
        </h2>
        <p class="text-gray-600 font-inter mt-1">
          Update your services, questions & service area
        </p>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto px-8 py-6 space-y-8 font-inter">

      <!-- Category -->
      <!-- <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">

        </label>
        <select [(ngModel)]="editCategoryId" (change)="onCategoryChange(editCategoryId!)"

      <div class="space-y-2">
  <label class="block text-sm font-semibold text-gray-800">
    Service Category <span class="text-orange-600">*</span>
  </label>

  <div class="relative">
    <!-- Icon -->
    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5l7 7-7 7" />
      </svg>
    </span>

    <!-- Select -->
    <select
      [(ngModel)]="editCategoryId"
      (change)="onCategoryChange(editCategoryId!)"
      class="w-full appearance-none pl-10 pr-10 py-3 border border-gray-300 rounded-xl
             bg-white text-gray-800
             focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500
             transition duration-200"
    >
      <option value="" disabled selected>Select a category</option>
      <option *ngFor="let cat of parentCategories" [value]="cat.id">
        {{ cat.name }}
      </option>
    </select>

    <!-- Dropdown arrow -->
    <span class="absolute inset-y-0 right-3 flex items-center text-gray-400 pointer-events-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 9l-7 7-7-7" />
      </svg>
    </span>
  </div>
</div>

     
      <!-- Sub Categories -->

<div *ngIf="subCategories.length">
  <label class="block text-sm font-semibold text-gray-800 mb-4">
    Choose Sub Categories
  </label>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-52 overflow-y-auto pr-2">

  <label
    *ngFor="let sub of subCategories"
    class="relative flex items-center gap-3 px-3 py-2.5 rounded-lg border cursor-pointer
           transition-all duration-200
           hover:border-orange-400 hover:bg-orange-50/40"
    [ngClass]="{
      'border-orange-500 bg-orange-50 ring-1 ring-orange-200': isSubCategorySelected(sub.id),
      'border-gray-200 bg-white': !isSubCategorySelected(sub.id)
    }"
  >
    <!-- Hidden checkbox -->
    <input
      type="checkbox"
      class="hidden"
      [checked]="isSubCategorySelected(sub.id)"
      (change)="toggleSubCategory(sub.id)"
    />

    <!-- Custom checkbox -->
    <div
      class="w-5 h-5 flex items-center justify-center rounded-md border transition-all"
      [ngClass]="{
        'border-orange-500 bg-orange-500': isSubCategorySelected(sub.id),
        'border-gray-300 bg-white': !isSubCategorySelected(sub.id)
      }"
    >
      <i
        class="ri-check-line text-white text-sm transition-opacity"
        [class.opacity-100]="isSubCategorySelected(sub.id)"
        [class.opacity-0]="!isSubCategorySelected(sub.id)"
      ></i>
    </div>

    <!-- Text -->
    <div class="flex-1 leading-tight">
      <p class="font-medium text-gray-900 text-sm">
        {{ sub.name }}
      </p>
      <p class="text-[11px] text-gray-500">
        Service option
      </p>
    </div>

  </label>

</div>

</div>





      <!-- Questions -->
      <div *ngIf="subCategoryQuestions.length">
  <label class="block text-sm font-semibold text-gray-800 mb-2">
    Service Questions
  </label>

  <div class="space-y-2 max-h-48 overflow-y-auto pr-1">
    <label
      *ngFor="let q of subCategoryQuestions"
      class="flex items-start gap-3 p-2.5 border rounded-lg cursor-pointer
             transition hover:bg-orange-50"
    >
      <!-- Checkbox -->
      <input
        type="checkbox"
        class="mt-1 w-4 h-4 text-orange-600 border-gray-300 rounded
               focus:ring-orange-500"
        [checked]="selectedQuestions.includes(q.id)"
        (change)="toggleQuestion(q.id)"
      />

      <!-- Text -->
      <div class="leading-tight">
        <p class="text-sm font-medium text-gray-800">
          {{ q.questionText }}
        </p>
        <p class="text-xs text-gray-500">
          {{ q.questionType }}
        </p>
      </div>
    </label>
  </div>
</div>


      <!-- Coverage Area -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Coverage Area
        </label>

        <select [(ngModel)]="serviceArea.type" class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-3">
          <option value="">Select Area Type</option>
          <option value="city_radius">City</option>
          <option value="polygon">Radius (KM)</option>
          <option value="pincode_list">Pincode List</option>
        </select>

        <!-- City -->
        <select *ngIf="serviceArea.type === 'city_radius'" [(ngModel)]="serviceArea.cityId"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg">
          <option *ngFor="let city of cities" [value]="city.id">
            {{ city.name }}
          </option>
        </select>

        <!-- Radius -->
        <input *ngIf="serviceArea.type === 'polygon'" type="number" [(ngModel)]="serviceArea.radiusKm"
          placeholder="Enter radius in KM" class="w-full px-4 py-3 border border-gray-300 rounded-lg" />

        <!-- Pincode -->
        <div *ngIf="serviceArea.type === 'pincode_list'">
          <div class="flex gap-2 mb-3">
            <input [(ngModel)]="pincodeInput" placeholder="Enter pincode"
              class="flex-1 px-4 py-2 border border-gray-300 rounded-lg" />
            <button (click)="addPincode()" class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">
              Add
            </button>
          </div>

          <div class="flex flex-wrap gap-2">
            <span *ngFor="let p of serviceArea.pincodes; let i = index"
              class="bg-gray-200 px-3 py-1 rounded-full flex items-center">
              {{ p }}
              <button (click)="removePincode(i)" class="ml-2 text-red-500 font-bold">
                ×
              </button>
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 px-8 py-5 border-t border-gray-200">
      <button (click)="closeServicesModal()" class="px-6 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
        Cancel
      </button>
      <button (click)="saveServicesAndArea()"
        class="px-8 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 font-medium">
        Save Changes
      </button>
    </div>

  </div>
</div>
