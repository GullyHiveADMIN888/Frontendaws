<div class="bg-white rounded-2xl shadow-xl p-8 lg:p-12 border border-gray-100">

  <div class="flex items-center mb-8">
    <div class="w-12 h-12 bg-orange-600 rounded-full flex items-center justify-center mr-4">
      <i class="ri-user-line text-2xl text-white"></i>
    </div>
    <div>
      <h2 class="text-3xl font-bold text-gray-900 font-poppins">Basic Information</h2>
      <p class="text-gray-600 font-inter mt-1">Let's start with your basic details</p>
    </div>
  </div>

  <div class="space-y-8">
    <!-- Profile Picture -->
    <div class="flex justify-center">
      <div class="text-center">
        <label class="block text-sm font-medium text-gray-700 mb-4 font-inter">
          Profile Picture <span class="text-gray-500">(Optional)</span>
        </label>
        <div class="relative">
          <div class="w-32 h-32 rounded-full border-4 border-gray-200 overflow-hidden bg-gray-100 mx-auto">
            <ng-container *ngIf="profilePreview; else noPhotoTemplate">
              <img [src]="profilePreview" alt="Profile" class="w-full h-full object-cover object-top" />
            </ng-container>

            <ng-template #noPhotoTemplate>
              <div class="w-full h-full flex items-center justify-center">
                <i class="ri-user-line text-5xl text-gray-400"></i>
              </div>
            </ng-template>
          </div>
          <input aria-label="Upload Profile Picture" type="file" accept="image/*"
            (change)="onProfilePictureChange($event)" class="hidden" [id]="fileInputId" />
          <label [for]="fileInputId"
            class="absolute bottom-0 right-1/2 transform translate-x-16 bg-orange-600 text-white w-10 h-10 rounded-full flex items-center justify-center cursor-pointer hover:bg-orange-700 transition-colors shadow-lg">
            <i class="ri-camera-line text-xl"></i>
          </label>
        </div>
        <button *ngIf="profilePreview" type="button" (click)="removeProfilePicture()"
          class="mt-3 text-sm text-red-600 hover:text-red-700 font-inter whitespace-nowrap cursor-pointer">
          <i class="ri-delete-bin-line mr-1"></i>
          Remove Photo
        </button>
      </div>
    </div>

    <!-- Personal Details -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2 font-inter">
          First Name <span class="text-orange-600">*</span>
        </label>
        <input type="text" [value]="formData?.firstName || ''"
          (input)="onInputFieldChange('firstName', $any($event.target).value)"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent font-inter"
          placeholder="Enter your first name" maxlength="50" />
        <p *ngIf="errors?.firstName" class="text-red-500 text-sm mt-1 font-inter">
          {{ errors.firstName }}
        </p>
      </div>

         <div>
        <label class="block text-sm font-medium text-gray-700 mb-2 font-inter">
          Last Name
        </label>
        <input type="text" [value]="formData?.lastName || ''"
          (input)="onInputFieldChange('lastName', $any($event.target).value)"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent font-inter"
          placeholder="Enter your last name" maxlength="50" />
        <p *ngIf="errors?.lastName" class="text-red-500 text-sm mt-1 font-inter">
          {{ errors.lastName }}
        </p>
      </div>

<div class="relative">
  <label class="block text-sm font-medium text-gray-700 mb-2 font-inter">
    Password <span class="text-orange-600">*</span>
  </label>

  <input
    [type]="showPassword ? 'text' : 'password'"
    [value]="formData?.password || ''"
    (input)="onInputFieldChange('password', $any($event.target).value)"
    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent font-inter"
    placeholder="Enter password"
    minlength="6"
    maxlength="34"
  />

  <button
    type="button"
    (click)="togglePasswordVisibility()"
    class="absolute top-1/2  pt-5 right-3 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
  >
    <i class="ri-eye-line pt-5" *ngIf="!showPassword"></i>
    <i class="ri-eye-off-line pt-5" *ngIf="showPassword"></i>
  </button>

  <p *ngIf="errors?.password" class="text-red-500 text-sm mt-1 font-inter">
    {{ errors.password }}
  </p>
</div>

     <div>
  <label class="block text-sm font-medium mb-2 font-inter">
    Confirm Password <span class="text-orange-600">*</span>
  </label>

  <input
    type="password"
    [value]="formData?.confirmPassword || ''"
    (input)="onInputFieldChange('confirmPassword', $any($event.target).value)"
    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent font-inter"
    placeholder="Confirm password"
    minlength="6"
    maxlength="34"
  />

  <p *ngIf="errors?.confirmPassword" class="text-red-500 text-sm mt-1 font-inter">
    {{ errors.confirmPassword }}
  </p>
</div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2 font-inter">
          Service Category <span class="text-orange-600">*</span>
        </label>
        <select [(ngModel)]="formData.serviceCategoryId" (ngModelChange)="onCategoryChange($event)"
          name="serviceCategoryId" class="w-full px-4 py-3 border border-gray-300 rounded-lg">

          <option [ngValue]="null">Select Category</option>

          <option *ngFor="let cat of parentCategories" [ngValue]="cat.id">
            {{ cat.name }}
          </option>
        </select>
        <p *ngIf="errors?.serviceCategoryId" class="text-red-500 text-sm mt-1 font-inter">
          {{ errors.serviceCategoryId }}
        </p>

      </div>
      <!-- Professional Type -->
      <!-- <div>

          class="w-full px-4 py-3 border border-gray-300 rounded-lg">

          <option *ngFor="let type of professionalTypes" [ngValue]="type.value">

          {{ errors.professionalType }}

    </div>

    <div>

      <!-- Subcategory Checkboxes -->
      <div *ngIf="subCategories.length" class="mt-4">
        <label class="block text-sm font-medium text-gray-700 mb-2 font-inter">
          Sub Categories <span class="text-orange-600">*</span>
        </label>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-80 overflow-y-auto pr-2">
          <label *ngFor="let sub of subCategories"
            class="flex items-center p-4 border-2 rounded-lg cursor-pointer transition-all"
            [class.border-orange-500]="formData.subCategoryIds?.includes(sub.id)"
            [class.bg-orange-50]="formData.subCategoryIds?.includes(sub.id)">
            <input type="checkbox"
              class="w-5 h-5 text-orange-600 border-gray-300 rounded focus:ring-orange-500 cursor-pointer"
              [checked]="formData.subCategoryIds?.includes(sub.id)" (change)="toggleSubCategory(sub.id)" />
            <span class="ml-3">{{ sub.name }}</span>
          </label>
        </div>
        <p *ngIf="errors?.subCategoryIds" class="text-red-500 text-sm mt-1 font-inter">
          {{ errors.subCategoryIds }}
        </p>
      </div>





    </div>

    <!-- Navigation -->
    <div class="flex justify-end pt-6 border-t border-gray-200">

      <button type="button" (click)="onNextClick()"
        class="px-8 py-3 bg-orange-600 text-white rounded-lg transition-colors font-medium font-inter">
        Continue to Legal Identity
      </button>

    </div>
