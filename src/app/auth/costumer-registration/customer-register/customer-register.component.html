<div class="min-h-screen bg-gradient-to-br from-orange-50 via-white to-orange-50 py-12">
  
  <!-- Header -->
  <div class="text-center mb-12">
    <h1 class="text-4xl lg:text-5xl font-bold text-gray-900 mb-4">
      Customer <span class="text-orange-600">Registration</span>
    </h1>
    <p class="text-lg text-gray-600">
      Join GullyHive and get access to trusted service providers in your area
    </p>
  </div>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-4 py-12">
    
    <!-- STEP INDICATOR - Using customer specific component -->
    <app-customer-step-indicator
      *ngIf="!submitSuccess"
      [currentStep]="currentStep"
      [totalSteps]="3">
    </app-customer-step-indicator>

    <!-- STEPS -->
    <ng-container *ngIf="!submitSuccess">
      <ng-container [ngSwitch]="currentStep">

        <!-- Step 1: Basic Info -->
        <app-customer-step1-basic-info
          *ngSwitchCase="1"
          [formData]="formData"
          [errors]="errors"
          (inputChange)="onInputChange($event)"
          (next)="goToStep(2)">
        </app-customer-step1-basic-info>

        <!-- Step 2: Address Details -->
        <app-customer-step2-address
          *ngSwitchCase="2"
          [formData]="formData"
          [errors]="errors"
          (inputChange)="onInputChange($event)"
          (next)="goToStep(3)"
          (back)="goToStep(1)">
        </app-customer-step2-address>

        <!-- Step 3: Preferences & Submit -->
        <app-customer-step3-preferences
          *ngSwitchCase="3"
          [formData]="formData"
          [errors]="errors"
          [isSubmitting]="isSubmitting"
          (inputChange)="onInputChange($event)"
          (submit)="submitForm()"
          (back)="goToStep(2)">
        </app-customer-step3-preferences>

      </ng-container>
    </ng-container>

    <!-- SUCCESS -->
    <div *ngIf="submitSuccess"
         class="bg-white rounded-2xl shadow-xl p-12 border border-gray-100 text-center">
      <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="ri-checkbox-circle-fill text-6xl text-green-600"></i>
      </div>
      <h2 class="text-3xl font-bold text-gray-900 mb-4">
        Registration Successful!
      </h2>
      <p class="text-lg text-gray-600 mb-8">
        Welcome to GullyHive! You can now log in and start booking services.
      </p>
      <a routerLink="/customer/login"
         class="inline-block px-8 py-3 bg-orange-600 text-white rounded-lg hover:bg-orange-700">
        <i class="ri-login-circle-line mr-2"></i>
        Login Now
      </a>
    </div>

  </main>
</div>
